<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Editor Demo</title>
</head>

<body>
    
    
  

    <div class="container">
        <!-- Editor Section -->
       
        <div class="section">
            <h2>📝 Rich Text Editor</h2>
            <div id="editor-container"></div>
        </div>
        <!-- Output Section -->
        <div class="section">
            <h2>📤 Output Content</h2>
            <span class="output-label">Content from editor (updates in real-time):</span>
            <div id="content-container">
                <p>Hello World</p>
            </div>
        </div>
    </div>
    
    <!-- Script để khởi tạo editor -->
    <script type="module" src="main.js"></script>
</body>

</html>
