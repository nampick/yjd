name: Release

# Publishing keys off the GitHub Release "published" event, which fires
# reliably — unlike the tag-push event, which intermittently failed to trigger
# (v2.10.0, v2.11.1, v2.11.2 all had to be published manually).
#
# Canonical flow:
#   npm run release -- X.Y.Z        # gates (version, CHANGELOG, build, test, size)
#   branch → PR → merge → push master
#   git tag -a vX.Y.Z && git push origin vX.Y.Z
#   npm run release:gh -- X.Y.Z     # creates the GitHub Release with a user PAT
#                                   # → fires `release: published` → this workflow
#                                   # → npm publish --provenance
#
# `workflow_dispatch` is a manual escape hatch: publish a given tag on demand
# (e.g. if a publish failed and you want to retry without re-cutting a release).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish, e.g. v2.11.2'
        required: true

permissions:
  contents: read
  id-token: write   # npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Build/publish the exact tagged commit, not the default-branch tip.
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Publish to npm (provenance)
        # NPM_TOKEN MUST be a classic "Automation" token (it bypasses 2FA).
        # A "Publish" or granular token without 2FA-bypass fails with:
        #   403 - Two-factor authentication ... is required to publish packages.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
