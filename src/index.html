<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RichEditor Library Demo</title>
</head>
<body>
  <div id="editor-root"></div>
  <script type="module">
    import { EditorCore } from './lib/EditorCore.js';
    EditorCore('#editor-root', {
      toolbar: [
        'bold', 'italic', 'underline', 'strike', 'emoji', 'image', 'link', 'table', 'undo', 'redo'
      ],
      placeholder: 'Soạn nội dung ở đây... (Configurable)',
      theme: 'light',
      height: 350,
      features: {
        emoji: true,
        image: true,
        table: true,
        wordCount: true,
        breadcrumb: true
      }
    });
  </script>
</body>
</html>
