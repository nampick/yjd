<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Editor - New Modular Architecture Test</title>
    
</head>
<body>
    <div class="container">
        
        <div id="test-editor" class="test-editor"></div>
        
    </div>

    <script type="module">
        // Import the new architecture
        import RichEditor from './lib/index.js';
        

            // Create editor instance with table feature
            const editor = new RichEditor('#test-editor', {
                toolbar: ['bold', 'italic', 'underline', 'strike'],
                height: 300,
                theme: 'light',
                placeholder: '🎉 Click table button (⊞) to insert tables...',
                'table': {
                    maxRows: 8,
                    maxCols: 6,
                    cellPadding: '8px',
                    borderStyle: '1px solid #ddd'
                }
            });
            
 
    </script>
</body>
</html>
