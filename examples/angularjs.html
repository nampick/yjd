<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yjd × AngularJS 1.x — dev test</title>
<link rel="stylesheet" href="/lib/styles.min.css">
<style>
  body{font:15px/1.6 system-ui,sans-serif;margin:0;background:#f4f4f8;color:#16161d}
  .wrap{max-width:900px;margin:0 auto;padding:24px}
  h1{font-size:20px}.muted{color:#6b6f7e}
  .grid{display:grid;grid-template-columns:1fr;gap:16px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  button{font:600 13px system-ui;border:1px solid #d7d7e2;background:#fff;border-radius:9px;padding:7px 12px;cursor:pointer}
  button:hover{border-color:#b52e31}
  pre{background:#16161d;color:#e7e7f3;padding:12px 14px;border-radius:12px;overflow:auto;font-size:12px;max-height:220px}
  .badge{display:inline-block;background:#fdecec;color:#b52e31;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:600}
  .err{color:#c92a2a;white-space:pre-wrap}
</style>
</head>
<body>
<!-- No ng-app: we bootstrap manually AFTER yjd's ES module loads. -->
<div id="app" ng-controller="Main">
  <div class="wrap">
    <h1>yjd × AngularJS 1.x <span class="badge">dev test</span></h1>
    <p class="muted">A directive with <code>ng-model</code> two-way binding. Edit below; the HTML updates live.</p>
    <div class="grid">
      <yjd-editor ng-model="html" placeholder="Write something…"></yjd-editor>
      <div>
        <div class="row">
          <button id="btn-sample" ng-click="setSample()">Set sample</button>
          <button id="btn-clear" ng-click="clear()">Clear</button>
        </div>
        <div class="muted">Live <code>ng-model</code> (HTML):</div>
        <pre id="out">{{ html }}</pre>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/angular@1.8.3/angular.min.js"></script>
<script type="module">
import yjd from '/dist/rich-editor.esm.js';

angular.module('app', [])
  .directive('yjdEditor', function () {
    return {
      restrict: 'E',
      scope: { ngModel: '=', placeholder: '@' },
      link: function (scope, element) {
        var ed = new yjd(element[0], {
          content: scope.ngModel || '',
          placeholder: scope.placeholder,
          onChange: function (html) {
            scope.$applyAsync(function () { scope.ngModel = html; });
          },
        });
        window.__ed = ed;
        scope.$watch('ngModel', function (v) {
          if (v != null && v !== ed.getContent()) ed.setContent(v);
        });
        scope.$on('$destroy', function () { ed.destroy(); });
      },
    };
  })
  .controller('Main', function ($scope) {
    $scope.html = '<p>Hello from <b>AngularJS</b> 🅰️ — type here.</p>';
    $scope.setSample = function () { $scope.html = '<h2>Set from $scope</h2><ul><li>one</li><li>two</li></ul>'; };
    $scope.clear = function () { $scope.html = ''; };
  });

// Bootstrap now that yjd is available to the directive.
angular.bootstrap(document.getElementById('app'), ['app']);

window.addEventListener('error', (e) => {
  const d = document.createElement('pre'); d.className = 'err'; d.textContent = 'JS error: ' + e.message;
  document.body.appendChild(d);
});
</script>
</body>
</html>
