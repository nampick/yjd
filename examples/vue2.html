<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yjd × Vue 2 — dev test</title>
<link rel="stylesheet" href="/lib/styles.min.css">
<style>
  body{font:15px/1.6 system-ui,sans-serif;margin:0;background:#f4f4f8;color:#16161d}
  .wrap{max-width:900px;margin:0 auto;padding:24px}
  h1{font-size:20px}.muted{color:#6b6f7e}
  .grid{display:grid;grid-template-columns:1fr;gap:16px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  button{font:600 13px system-ui;border:1px solid #d7d7e2;background:#fff;border-radius:9px;padding:7px 12px;cursor:pointer}
  button:hover{border-color:#42b883}
  pre{background:#16161d;color:#e7e7f3;padding:12px 14px;border-radius:12px;overflow:auto;font-size:12px;max-height:220px}
  .badge{display:inline-block;background:#e6f7ee;color:#2f9e44;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:600}
  .err{color:#c92a2a;white-space:pre-wrap}
</style>
</head>
<body>
<div id="app">
  <div class="wrap">
    <h1>yjd × Vue 2 <span class="badge">dev test</span></h1>
    <p class="muted">Options API + <code>v-model</code> (value + input). Edit below; the HTML updates live.</p>
    <div class="grid">
      <yjd-editor v-model="html" placeholder="Write something…"></yjd-editor>
      <div>
        <div class="row">
          <button id="btn-sample" @click="setSample">Set sample</button>
          <button id="btn-clear" @click="clear">Clear</button>
        </div>
        <div class="muted">Live <code>v-model</code> (HTML):</div>
        <pre id="out">{{ html }}</pre>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@2.7.16/dist/vue.js"></script>
<script type="module">
import yjd from '/dist/rich-editor.esm.js';
const Vue = window.Vue;

Vue.component('yjd-editor', {
  props: { value: String, placeholder: String },
  mounted() {
    this.ed = new yjd(this.$el, {
      content: this.value || '',
      placeholder: this.placeholder,
      onChange: (html) => this.$emit('input', html),   // Vue 2 v-model
    });
    window.__ed = this.ed;
  },
  beforeDestroy() { this.ed && this.ed.destroy(); },
  watch: {
    value(v) { if (this.ed && v != null && v !== this.ed.getContent()) this.ed.setContent(v); },
  },
  render(h) { return h('div'); },
});

new Vue({
  el: '#app',
  data: { html: '<p>Hello from <b>Vue 2</b> 💚 — type here.</p>' },
  methods: {
    setSample() { this.html = '<h2>Set from Vue 2 data</h2><ul><li>one</li><li>two</li></ul>'; },
    clear() { this.html = ''; },
  },
});

window.addEventListener('error', (e) => {
  const d = document.createElement('pre'); d.className = 'err'; d.textContent = 'JS error: ' + e.message;
  document.body.appendChild(d);
});
</script>
</body>
</html>
