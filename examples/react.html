<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yjd × React — dev test</title>
<link rel="stylesheet" href="/lib/styles.min.css">
<style>
  body{font:15px/1.6 system-ui,sans-serif;margin:0;background:#f4f4f8;color:#16161d}
  .wrap{max-width:900px;margin:0 auto;padding:24px}
  h1{font-size:20px}.muted{color:#6b6f7e}
  .grid{display:grid;grid-template-columns:1fr;gap:16px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  button{font:600 13px system-ui;border:1px solid #d7d7e2;background:#fff;border-radius:9px;padding:7px 12px;cursor:pointer}
  button:hover{border-color:#6d5efc}
  pre{background:#16161d;color:#e7e7f3;padding:12px 14px;border-radius:12px;overflow:auto;font-size:12px;max-height:220px}
  .badge{display:inline-block;background:#efedff;color:#5a48ee;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:600}
  .err{color:#c92a2a;white-space:pre-wrap}
</style>
</head>
<body>
<div id="root"></div>

<!-- React + ReactDOM (ESM) and yjd (local dist) are imported inside the module below. -->
<script type="text/babel" data-type="module" data-presets="react">
import React, { useRef, useEffect, useState } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import yjd from '/dist/rich-editor.esm.js';

// --- Reusable wrapper: <YjdEditor value onChange placeholder options /> ---
function YjdEditor({ value, onChange, placeholder, options }) {
  const hostRef = useRef(null);
  const edRef = useRef(null);

  useEffect(() => {
    const ed = new yjd(hostRef.current, {
      content: value ?? '',
      placeholder,
      onChange: (html) => onChange?.(html),
      ...options,
    });
    edRef.current = ed;
    window.__ed = ed;                       // for the WebKit smoke test
    return () => ed.destroy();              // cleanup (handles StrictMode double-mount)
  }, []);

  useEffect(() => {
    const ed = edRef.current;
    if (ed && value != null && value !== ed.getContent()) ed.setContent(value);
  }, [value]);

  return <div ref={hostRef} />;
}

// --- Demo app: controlled value + live HTML output ---
function App() {
  const [html, setHtml] = useState('<p>Hello from <b>React</b> 👋 — type here.</p>');
  return (
    <div className="wrap">
      <h1>yjd × React <span className="badge">dev test</span></h1>
      <p className="muted">Controlled <code>value</code> ⇄ <code>onChange</code>. Edit below; the HTML updates live. Buttons prove <code>setContent</code> sync.</p>
      <div className="grid">
        <YjdEditor value={html} onChange={setHtml} placeholder="Write something…" />
        <div>
          <div className="row">
            <button id="btn-sample" onClick={() => setHtml('<h2>Set from React state</h2><ul><li>one</li><li>two</li></ul>')}>Set sample</button>
            <button id="btn-clear" onClick={() => setHtml('')}>Clear</button>
          </div>
          <div className="muted">Live <code>value</code> (HTML):</div>
          <pre id="out">{html}</pre>
        </div>
      </div>
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
// StrictMode double-invokes effects in dev — the destroy() cleanup must handle it.
root.render(<React.StrictMode><App /></React.StrictMode>);
window.addEventListener('error', (e) => {
  const d = document.createElement('pre'); d.className = 'err'; d.textContent = 'JS error: ' + e.message;
  document.body.appendChild(d);
});
</script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
</body>
</html>
